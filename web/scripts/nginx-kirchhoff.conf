server {
    server_name kirchhoff.openconverters.com;

    access_log /var/log/kirchhoff_web_access.log;
    error_log /var/log/kirchhoff_web_error.log;

    charset utf-8;
    root    /opt/kirchhoff/dist;
    index   index.html;

    gzip_static on;

    # Content-hashed build assets — safe to cache hard.
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # The engine bundle has a stable name, so revalidate (ETag/304) instead of
    # caching blind — a redeploy must reach returning visitors.
    location = /kirchhoff.js {
        add_header Cache-Control "no-cache";
    }

    # Kelvin TAS-DB parts data (Kirchhoff binds real parts from the same catalog),
    # served off the /cache volume — NOT a backend, just static files.
    location ~ ^/kelvin/.+\.kidx$ {
        root /cache;
        gzip_static on;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location /kelvin/ {
        root /cache;
        gzip_static on;
        add_header Cache-Control "no-cache";
    }

    # Interaction telemetry → the local oc-telemetry service (writes to the shared
    # OM Postgres, openconverters_telemetry schema). Same-origin, so no CORS.
    location = /telemetry {
        proxy_pass http://127.0.0.1:8787/telemetry;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 5s;
        client_max_body_size 16k;
    }

    # Umami analytics — same-box OM instance (127.0.0.1:3000, BASE_PATH=/stats),
    # as the Heaviside vhost proxies it. Same-origin, first-party tracker.
    location = /stats { return 308 /stats/; }
    location /stats/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA: fall back to the shell, and never cache the shell so redeploys show.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    listen 80;
}
